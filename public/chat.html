<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat App | Messages</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="light-mode">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1 class="app-logo">💬 Chat</h1>
                <div class="header-actions">
                    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme">🌙</button>
                    <button id="close-sidebar" class="btn-close-sidebar" aria-label="Close sidebar">✕</button>
                </div>
            </div>

            <!-- Rooms Section -->
            <div class="sidebar-section">
                <h3 class="section-title">Rooms</h3>
                <ul id="rooms-list" class="rooms-list">
                    <!-- Rooms will be injected here -->
                </ul>
            </div>

            <!-- Online Users Section -->
            <div class="sidebar-section">
                <h3 class="section-title">Online Users</h3>
                <ul id="users-list" class="users-list">
                    <!-- Users will be injected here -->
                </ul>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Chat Header -->
            <div class="chat-header">
                <div class="header-left">
                    <button id="menu-toggle" class="menu-toggle" aria-label="Open menu">☰</button>
                    <div class="room-details">
                        <h2 id="current-room" class="room-name">Select a Room</h2>
                        <span class="room-info" id="room-info"></span>
                    </div>
                </div>
                <div class="header-right">
                    <a href="index.html" class="btn-leave">Leave Chat</a>
                </div>
            </div>

            <!-- Messages Container -->
            <div class="messages-container" id="messages-container">
                <div id="messages" class="messages">
                    <!-- System and user messages appear here -->
                </div>
                <!-- Typing Indicator moved inside scroll area for better flow -->
                <div id="typing-indicator" class="typing-indicator"></div>
            </div>

            <!-- Chat Footer -->
            <div class="chat-footer">
                <!-- Message Input -->
                <form id="message-form" class="message-form">
                    <button id="voice-message-btn" type="button" class="btn-voice-message"
                        title="Press & hold to record voice message" aria-label="Record voice message">
                        <span class="voice-msg-icon">🎙️</span>
                    </button>
                    <input id="message-input" type="text" placeholder="Type a message..." required autocomplete="off"
                        class="message-input">
                    <button class="btn-send" type="submit" aria-label="Send message">
                        <span>📤</span>
                    </button>
                </form>

                <!-- Voice Recording Indicator -->
                <div id="recording-indicator" class="recording-indicator hidden">
                    <div class="recording-waveform">
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                    </div>
                    <span id="recording-time" class="recording-time">0:00</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Socket.IO Client Script -->
    <script src="/socket.io/socket.io.js"></script>
    <!-- Application Client Logic -->
    <script src="script.js"></script>
</body>

</html>
